<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>三角洲行动 · 搜打撤原型</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; background:#0a0e12; }
  body { font-family: "Consolas","Courier New",monospace; color:#cfe; }
  #game { display:block; position:fixed; inset:0; cursor:none; background:#11161c; }
  #hint { position:fixed; left:50%; bottom:14px; transform:translateX(-50%);
          font-size:12px; color:#5a7; opacity:.7; pointer-events:none; user-select:none; }
</style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hint">WASD 移动 · 鼠标瞄准 · 左键射击 · R 换弹 · E 搜索(集装箱/大保险/武器箱) · Shift 疾跑 · 数字键切换武器 · 机密/绝密含 BOSS · 联机有击杀榜与段位</div>
  <script src="meta.js"></script>
  <script src="net.js"></script>
  <script src="game.js"></script>
</body>
</html>
